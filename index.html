<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PitStop – Always a Clean Stop Ahead</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    :root {
      --green: #1db954;
      --dark: #0a0a0a;
      --card: #141414;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #888;
      --red: #ff4444;
      --yellow: #ffd700;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--dark); color: var(--text); font-family: 'Nunito', sans-serif; min-height: 100vh; }

    /* NAVBAR */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem; background: #0d0d0d;
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000;
    }
    .logo { font-family: 'Space Mono', monospace; font-size: 1.4rem; color: var(--green); letter-spacing: -1px; }
    .logo span { color: var(--text); }
    .nav-tabs { display: flex; gap: 0.5rem; }
    .tab-btn {
      padding: 0.4rem 1rem; border-radius: 20px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer; font-family: 'Nunito', sans-serif;
      font-size: 0.85rem; transition: all 0.2s;
    }
    .tab-btn.active, .tab-btn:hover { background: var(--green); color: #000; border-color: var(--green); font-weight: 700; }

    /* HERO */
    .hero {
      text-align: center; padding: 3rem 2rem 2rem;
      background: radial-gradient(ellipse at 50% 0%, #1db95422 0%, transparent 70%);
    }
    .hero h1 { font-size: 2.8rem; font-weight: 900; line-height: 1.1; }
    .hero h1 span { color: var(--green); }
    .hero p { color: var(--muted); margin-top: 0.5rem; font-size: 1rem; }

    /* FILTERS */
    .filters {
      display: flex; gap: 0.8rem; padding: 1rem 2rem; flex-wrap: wrap;
      background: #0d0d0d; border-bottom: 1px solid var(--border);
    }
    .filters select, .filters button {
      padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid var(--border);
      background: var(--card); color: var(--text); font-family: 'Nunito', sans-serif;
      font-size: 0.9rem; cursor: pointer;
    }
    .filters button { background: var(--green); color: #000; font-weight: 700; border-color: var(--green); }
    .filters button:hover { opacity: 0.85; }

    /* PAGES */
    .page { display: none; padding: 2rem; }
    .page.active { display: block; }

    /* MAP PAGE */
    #map { height: 420px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 2rem; }
    .washroom-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
    .washroom-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 1.2rem; cursor: pointer; transition: all 0.2s;
    }
    .washroom-card:hover { border-color: var(--green); transform: translateY(-2px); }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; }
    .card-address { font-weight: 700; font-size: 0.95rem; flex: 1; margin-right: 0.5rem; }
    .status-badge {
      padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.75rem; font-weight: 700; white-space: nowrap;
    }
    .status-open { background: #1db95422; color: var(--green); border: 1px solid var(--green); }
    .status-closed { background: #ff444422; color: var(--red); border: 1px solid var(--red); }
    .status-maintenance { background: #ffd70022; color: var(--yellow); border: 1px solid var(--yellow); }
    .card-meta { display: flex; gap: 0.8rem; font-size: 0.8rem; color: var(--muted); margin-top: 0.5rem; flex-wrap: wrap; }
    .rating-stars { color: var(--yellow); font-size: 0.9rem; }
    .partner-tag {
      display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px;
      background: #1db95415; color: var(--green); font-size: 0.75rem; font-weight: 600;
    }

    /* DETAIL MODAL */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: #000000cc;
      z-index: 2000; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card); border: 1px solid var(--border); border-radius: 16px;
      padding: 2rem; max-width: 520px; width: 90%; max-height: 80vh; overflow-y: auto;
    }
    .modal h2 { font-size: 1.2rem; margin-bottom: 1rem; }
    .modal-close {
      float: right; background: none; border: none; color: var(--muted);
      font-size: 1.5rem; cursor: pointer; margin-top: -0.5rem;
    }
    .detail-row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    .detail-row:last-child { border-bottom: none; }
    .reviews-section { margin-top: 1.5rem; }
    .reviews-section h3 { font-size: 1rem; margin-bottom: 1rem; color: var(--green); }
    .review-item { background: #1a1a1a; border-radius: 8px; padding: 0.8rem; margin-bottom: 0.8rem; font-size: 0.85rem; }
    .review-meta { color: var(--muted); font-size: 0.75rem; margin-top: 0.3rem; }

    /* RATING FORM */
    .form-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; max-width: 560px; margin: 0 auto; }
    .form-card h2 { font-size: 1.4rem; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 0.4rem; font-weight: 600; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 0.7rem 1rem; border-radius: 8px; border: 1px solid var(--border);
      background: #1a1a1a; color: var(--text); font-family: 'Nunito', sans-serif; font-size: 0.9rem;
    }
    .form-group textarea { height: 80px; resize: none; }
    .slider-group { display: flex; align-items: center; gap: 1rem; }
    .slider-group input[type=range] { flex: 1; accent-color: var(--green); }
    .slider-val { font-family: 'Space Mono', monospace; color: var(--green); font-weight: 700; min-width: 20px; }
    .submit-btn {
      width: 100%; padding: 0.9rem; background: var(--green); color: #000;
      border: none; border-radius: 8px; font-size: 1rem; font-weight: 900;
      font-family: 'Nunito', sans-serif; cursor: pointer; margin-top: 0.5rem;
      transition: opacity 0.2s;
    }
    .submit-btn:hover { opacity: 0.85; }
    .success-msg { background: #1db95422; border: 1px solid var(--green); color: var(--green); border-radius: 8px; padding: 0.8rem; margin-top: 1rem; text-align: center; display: none; }

    /* STATS PAGE */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; text-align: center; }
    .stat-number { font-family: 'Space Mono', monospace; font-size: 2rem; color: var(--green); font-weight: 700; }
    .stat-label { color: var(--muted); font-size: 0.85rem; margin-top: 0.3rem; }
    .top-list { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
    .top-list h3 { margin-bottom: 1rem; color: var(--green); }
    .top-item { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    .top-item:last-child { border-bottom: none; }
  </style>
</head>
<body>

<nav>
  <div class="logo">Pit<span>Stop</span></div>
  <div class="nav-tabs">
    <button class="tab-btn active" onclick="showPage('map')">🗺️ Map</button>
    <button class="tab-btn" onclick="showPage('rate')">⭐ Rate</button>
    <button class="tab-btn" onclick="showPage('stats')">📊 Stats</button>
  </div>
</nav>

<div class="hero">
  <h1>Always a <span>clean stop</span> ahead.</h1>
  <p>Find verified, safe washrooms across Mumbai & Pune</p>
</div>

<!-- FILTERS -->
<div class="filters">
  <select id="filterCity" onchange="loadWashrooms()">
    <option value="">All Cities</option>
    <option value="1">Mumbai</option>
    <option value="2">Pune</option>
  </select>
  <select id="filterStatus" onchange="loadWashrooms()">
    <option value="">All Status</option>
    <option value="open">Open</option>
    <option value="closed">Closed</option>
    <option value="maintenance">Maintenance</option>
  </select>
  <select id="filterType" onchange="loadWashrooms()">
    <option value="">All Types</option>
    <option value="restaurant">Restaurant</option>
    <option value="petrol_pump">Petrol Pump</option>
    <option value="toll_plaza">Toll Plaza</option>
  </select>
  <button onclick="loadWashrooms()">🔍 Search</button>
</div>

<!-- MAP PAGE -->
<div id="page-map" class="page active">
  <div id="map"></div>
  <div class="washroom-grid" id="washroomGrid"></div>
</div>

<!-- RATE PAGE -->
<div id="page-rate" class="page">
  <div class="form-card">
    <h2>⭐ Submit a Rating</h2>
    <div class="form-group">
      <label>Your User ID</label>
      <input type="number" id="rUserId" placeholder="e.g. 1" min="1"/>
    </div>
    <div class="form-group">
      <label>Washroom</label>
      <select id="rWashroomId"></select>
    </div>
    <div class="form-group">
      <label>Cleanliness</label>
      <div class="slider-group">
        <input type="range" min="1" max="5" value="3" id="rCleanliness" oninput="document.getElementById('vCleanliness').textContent=this.value"/>
        <span class="slider-val" id="vCleanliness">3</span>
      </div>
    </div>
    <div class="form-group">
      <label>Safety</label>
      <div class="slider-group">
        <input type="range" min="1" max="5" value="3" id="rSafety" oninput="document.getElementById('vSafety').textContent=this.value"/>
        <span class="slider-val" id="vSafety">3</span>
      </div>
    </div>
    <div class="form-group">
      <label>Amenities</label>
      <div class="slider-group">
        <input type="range" min="1" max="5" value="3" id="rAmenities" oninput="document.getElementById('vAmenities').textContent=this.value"/>
        <span class="slider-val" id="vAmenities">3</span>
      </div>
    </div>
    <div class="form-group">
      <label>Review (optional)</label>
      <textarea id="rReview" placeholder="Write your experience..."></textarea>
    </div>
    <button class="submit-btn" onclick="submitRating()">Submit Rating</button>
    <div class="success-msg" id="successMsg">✅ Rating submitted successfully!</div>
  </div>
</div>

<!-- STATS PAGE -->
<div id="page-stats" class="page">
  <div class="stats-grid" id="statsGrid"></div>
  <div class="top-list" id="topList"></div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
  const API = 'http://localhost:3000/api';
  let map, allWashrooms = [];

  // Init map
  map = L.map('map').setView([19.0, 73.1], 10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    event.target.classList.add('active');
    if (name === 'stats') loadStats();
  }

  function starsHTML(rating) {
    const r = parseFloat(rating);
    let s = '';
    for (let i = 1; i <= 5; i++) s += i <= Math.round(r) ? '★' : '☆';
    return `<span class="rating-stars">${s}</span> ${r.toFixed(1)}`;
  }

  function statusBadge(status) {
    return `<span class="status-badge status-${status}">${status}</span>`;
  }

  async function loadWashrooms() {
    const city = document.getElementById('filterCity').value;
    const status = document.getElementById('filterStatus').value;
    const type = document.getElementById('filterType').value;

    let url = `${API}/washrooms?`;
    if (city) url += `city_id=${city}&`;
    if (status) url += `status=${status}&`;
    if (type) url += `partner_type=${type}&`;

    const res = await fetch(url);
    allWashrooms = await res.json();

    // Clear map markers
    map.eachLayer(l => { if (l instanceof L.Marker) map.removeLayer(l); });

    // Add markers
    allWashrooms.forEach(w => {
      const color = w.status === 'open' ? '🟢' : w.status === 'maintenance' ? '🟡' : '🔴';
      L.marker([w.gps_lat, w.gps_long])
        .addTo(map)
        .bindPopup(`<b>${w.address}</b><br>${color} ${w.status}<br>⭐ ${parseFloat(w.avg_rating).toFixed(1)}`);
    });

    // Render cards
    const grid = document.getElementById('washroomGrid');
    grid.innerHTML = allWashrooms.map(w => `
      <div class="washroom-card" onclick="openModal(${w.washroom_id})">
        <div class="card-top">
          <div class="card-address">${w.address}</div>
          ${statusBadge(w.status)}
        </div>
        <span class="partner-tag">${w.partner_type.replace('_', ' ')}</span>
        <div class="card-meta">
          <span>${starsHTML(w.avg_rating)}</span>
          <span>${w.accessibility ? '♿ Accessible' : ''}</span>
          <span>🚿 ${w.facilities}</span>
        </div>
      </div>
    `).join('');

    // Populate washroom dropdown in rate form
    const sel = document.getElementById('rWashroomId');
    sel.innerHTML = allWashrooms.map(w => `<option value="${w.washroom_id}">${w.address}</option>`).join('');
  }

  async function openModal(id) {
    const w = allWashrooms.find(x => x.washroom_id === id);
    const ratingsRes = await fetch(`${API}/ratings/washroom/${id}`);
    const ratings = await ratingsRes.json();

    const reviewsHTML = ratings.length ? ratings.map(r => `
      <div class="review-item">
        ${starsHTML((r.cleanliness + r.safety + r.amenities) / 3)}
        ${r.review_text ? `<div style="margin-top:0.3rem">${r.review_text}</div>` : ''}
        <div class="review-meta">Cleanliness: ${r.cleanliness} | Safety: ${r.safety} | Amenities: ${r.amenities}</div>
      </div>
    `).join('') : '<p style="color:var(--muted)">No reviews yet.</p>';

    document.getElementById('modalContent').innerHTML = `
      <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('open')">✕</button>
      <h2>${w.address}</h2>
      <div class="detail-row"><span>Status</span>${statusBadge(w.status)}</div>
      <div class="detail-row"><span>Rating</span>${starsHTML(w.avg_rating)}</div>
      <div class="detail-row"><span>Type</span><span class="partner-tag">${w.partner_type.replace('_',' ')}</span></div>
      <div class="detail-row"><span>Accessibility</span><span>${w.accessibility ? '♿ Yes' : 'No'}</span></div>
      <div class="detail-row"><span>Facilities</span><span>${w.facilities}</span></div>
      <div class="detail-row"><span>GPS</span><span>${w.gps_lat}, ${w.gps_long}</span></div>
      <div class="reviews-section">
        <h3>Reviews (${ratings.length})</h3>
        ${reviewsHTML}
      </div>
    `;
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modalOverlay'))
      document.getElementById('modalOverlay').classList.remove('open');
  }

  async function submitRating() {
    const body = {
      user_id: parseInt(document.getElementById('rUserId').value),
      washroom_id: parseInt(document.getElementById('rWashroomId').value),
      cleanliness: parseInt(document.getElementById('rCleanliness').value),
      safety: parseInt(document.getElementById('rSafety').value),
      amenities: parseInt(document.getElementById('rAmenities').value),
      review_text: document.getElementById('rReview').value
    };
    if (!body.user_id) return alert('Please enter your User ID');

    const res = await fetch(`${API}/ratings`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.rating_id) {
      document.getElementById('successMsg').style.display = 'block';
      setTimeout(() => document.getElementById('successMsg').style.display = 'none', 3000);
      loadWashrooms();
    }
  }

  async function loadStats() {
    const res = await fetch(`${API}/washrooms`);
    const washrooms = await res.json();
    const open = washrooms.filter(w => w.status === 'open').length;
    const accessible = washrooms.filter(w => w.accessibility).length;
    const avgRating = (washrooms.reduce((s, w) => s + parseFloat(w.avg_rating), 0) / washrooms.length).toFixed(2);
    const top = [...washrooms].sort((a, b) => b.avg_rating - a.avg_rating).slice(0, 5);

    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card"><div class="stat-number">${washrooms.length}</div><div class="stat-label">Total Washrooms</div></div>
      <div class="stat-card"><div class="stat-number">${open}</div><div class="stat-label">Currently Open</div></div>
      <div class="stat-card"><div class="stat-number">${accessible}</div><div class="stat-label">Accessible</div></div>
      <div class="stat-card"><div class="stat-number">${avgRating}</div><div class="stat-label">Avg Rating</div></div>
    `;

    document.getElementById('topList').innerHTML = `
      <h3>🏆 Top Rated Washrooms</h3>
      ${top.map((w, i) => `
        <div class="top-item">
          <span>#${i+1} ${w.address}</span>
          <span>${starsHTML(w.avg_rating)}</span>
        </div>
      `).join('')}
    `;
  }

  // Load on start
  loadWashrooms();
</script>
</body>
</html>
